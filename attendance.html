<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>바닷속 출석체크</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "맑은 고딕", sans-serif;
    min-height: 100vh;
    background: linear-gradient(#38bdf8, #0f766e, #064e3b);
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    overflow-x: hidden;
}

.bubble {
    position: fixed;
    bottom: -80px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    animation: float 8s infinite ease-in;
}

.bubble:nth-child(1) { left: 10%; animation-delay: 0s; }
.bubble:nth-child(2) { left: 30%; animation-delay: 2s; width: 18px; height: 18px; }
.bubble:nth-child(3) { left: 70%; animation-delay: 1s; width: 25px; height: 25px; }
.bubble:nth-child(4) { left: 85%; animation-delay: 3s; width: 15px; height: 15px; }

@keyframes float {
    to {
        transform: translateY(-110vh);
        opacity: 0;
    }
}

.container {
    width: 520px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    padding: 28px;
    border-radius: 24px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    position: relative;
}

h1 {
    text-align: center;
    color: #075985;
}

.sea-image {
    height: 150px;
    border-radius: 18px;
    background: linear-gradient(#7dd3fc, #0ea5e9);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
}

.fish {
    position: absolute;
    font-size: 34px;
    animation: swim 6s infinite linear;
}

.fish.one { top: 35px; left: -50px; }
.fish.two { top: 85px; left: -80px; animation-delay: 2s; }

@keyframes swim {
    to { transform: translateX(620px); }
}

.seaweed {
    position: absolute;
    bottom: 0;
    font-size: 40px;
}

.seaweed.left { left: 20px; }
.seaweed.right { right: 20px; }

.row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

input, select, button {
    padding: 11px;
    border-radius: 10px;
    border: 1px solid #bae6fd;
    font-size: 15px;
}

input {
    flex: 1;
}

button {
    background: #0284c7;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #0369a1;
}

.stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 20px 0;
}

.card {
    background: #ecfeff;
    border: 2px solid #bae6fd;
    border-radius: 16px;
    padding: 12px 6px;
    text-align: center;
    min-height: 120px;
}

.card strong {
    display: block;
    font-size: 26px;
    color: #0369a1;
    margin-top: 4px;
}

.character {
    font-size: 34px;
    margin-top: 8px;
}

.proud {
    animation: proud 1.2s infinite alternate;
}

.running {
    animation: run 0.4s infinite alternate;
}

@keyframes proud {
    from { transform: translateY(0) scale(1); }
    to { transform: translateY(-5px) scale(1.08); }
}

@keyframes run {
    from { transform: translateX(-4px); }
    to { transform: translateX(4px); }
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: #dbeafe;
    margin-bottom: 8px;
    padding: 12px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
}

li.late {
    background: #fde68a;
}
</style>
</head>

<body>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="container">
    <h1>🌊 바닷속 출석체크</h1>

    <div class="sea-image">
        <div class="fish one">🐠</div>
        <div class="fish two">🐟</div>
        <div class="seaweed left">🌿</div>
        <div class="seaweed right">🪸</div>
    </div>

    <div class="row">
        <input type="number" id="totalInput" placeholder="전체 인원 입력">
        <button onclick="setTotal()">설정</button>
    </div>

    <div class="row">
        <input type="text" id="nameInput" placeholder="이름 입력">
        <select id="statusInput">
            <option value="출석">출석</option>
            <option value="지각">지각</option>
        </select>
        <button onclick="addAttendance()">등록</button>
    </div>

    <div class="stats">
        <div class="card">
            전체
            <strong id="totalCount">0</strong>
            <div class="character">🐙</div>
        </div>

        <div class="card">
            출석
            <strong id="presentCount">0</strong>
            <div class="character proud">😄🙌</div>
            <small>뿌듯!</small>
        </div>

        <div class="card">
            지각
            <strong id="lateCount">0</strong>
            <div class="character running">🏃‍♂️💨</div>
            <small>뛰는 중!</small>
        </div>

        <div class="card">
            결석
            <strong id="absentCount">0</strong>
            <div class="character">🦀</div>
        </div>
    </div>

    <ul id="attendanceList"></ul>
</div>

<script>
let totalPeople = 0;
let attendanceList = [];

function setTotal() {
    const total = Number(document.getElementById("totalInput").value);

    if (total <= 0) {
        alert("전체 인원을 올바르게 입력하세요.");
        return;
    }

    totalPeople = total;
    updateCount();
}

function addAttendance() {
    const nameInput = document.getElementById("nameInput");
    const statusInput = document.getElementById("statusInput");

    const name = nameInput.value.trim();
    const status = statusInput.value;

    if (name === "") {
        alert("이름을 입력하세요.");
        return;
    }

    if (attendanceList.some(person => person.name === name)) {
        alert("이미 등록된 사람입니다.");
        return;
    }

    const time = new Date().toLocaleTimeString("ko-KR");

    attendanceList.push({ name, status, time });

    renderList();
    updateCount();

    nameInput.value = "";
    nameInput.focus();
}

function renderList() {
    const list = document.getElementById("attendanceList");
    list.innerHTML = "";

    attendanceList.forEach(person => {
        const li = document.createElement("li");

        if (person.status === "지각") {
            li.classList.add("late");
        }

        li.innerHTML = `
            <span>${person.name} - ${person.status}</span>
            <span>${person.time}</span>
        `;

        list.appendChild(li);
    });
}

function updateCount() {
    const present = attendanceList.filter(p => p.status === "출석").length;
    const late = attendanceList.filter(p => p.status === "지각").length;
    const absent = Math.max(totalPeople - present - late, 0);

    document.getElementById("totalCount").textContent = totalPeople;
    document.getElementById("presentCount").textContent = present;
    document.getElementById("lateCount").textContent = late;
    document.getElementById("absentCount").textContent = absent;
}

document.getElementById("nameInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        addAttendance();
    }
});
</script>

</body>
</html>
