<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>해양사고 현황 대시보드</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18212f;
      --muted: #5f6d7d;
      --line: #d9e0e7;
      --soft-line: #edf1f5;
      --surface: #ffffff;
      --page: #f4f7fa;
      --navy: #183b56;
      --teal: #0f766e;
      --blue: #2563eb;
      --amber: #d97706;
      --rose: #be123c;
      --green: #15803d;
      --violet: #6d28d9;
      --cyan: #0891b2;
      --highlight: #fff3bf;
      --highlight-border: #f59e0b;
      --shadow: 0 12px 26px rgba(24, 33, 47, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      font-size: 15px;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.95), rgba(37, 99, 235, 0.95)),
        #0f766e;
      position: relative;
      flex: 0 0 auto;
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.22);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
    }

    .brand-mark::before {
      height: 4px;
      top: 14px;
      transform: rotate(-8deg);
    }

    .brand-mark::after {
      height: 3px;
      bottom: 13px;
      transform: rotate(8deg);
      opacity: 0.78;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.25;
      font-weight: 800;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    select,
    input {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    select {
      min-width: 136px;
    }

    input {
      width: 160px;
    }

    select:focus,
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 34px;
      display: grid;
      gap: 18px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-height: 108px;
      box-shadow: var(--shadow);
      display: grid;
      align-content: space-between;
      gap: 10px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .metric-value {
      font-size: 30px;
      line-height: 1;
      font-weight: 850;
      color: var(--navy);
      word-break: keep-all;
    }

    .metric-note {
      color: var(--muted);
      font-size: 12px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.95fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--soft-line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.3;
      font-weight: 800;
    }

    .panel-kicker {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .chart-wrap {
      padding: 16px 18px 18px;
    }

    .bar-list {
      display: grid;
      gap: 10px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 82px minmax(120px, 1fr) 54px;
      align-items: center;
      gap: 10px;
      min-height: 28px;
    }

    .bar-label {
      color: var(--ink);
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-track {
      height: 16px;
      background: #edf2f7;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      min-width: 2px;
      transition: width 180ms ease;
    }

    .bar-value {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      text-align: right;
      font-weight: 800;
    }

    .table-wrap {
      overflow: auto;
      max-width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 460px;
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--soft-line);
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f8fafc;
      color: #344154;
      font-size: 12px;
      font-weight: 800;
      border-bottom: 1px solid var(--line);
    }

    tbody tr {
      transition: background 160ms ease, box-shadow 160ms ease;
    }

    tbody tr.selected {
      background: #e7f2ff;
      box-shadow: inset 6px 0 0 var(--blue);
    }

    tbody tr.selected td {
      border-bottom-color: #bfdbfe;
      font-weight: 800;
    }

    tbody tr.selected td:first-child {
      color: #1d4ed8;
    }

    tbody tr.highlight {
      background: var(--highlight);
      box-shadow: inset 6px 0 0 var(--highlight-border);
    }

    tbody tr.selected.highlight {
      background: linear-gradient(90deg, rgba(37, 99, 235, 0.14), rgba(255, 243, 191, 0.98));
      box-shadow: inset 6px 0 0 var(--highlight-border);
    }

    .year-cell {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .selected-badge {
      display: none;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: #1d4ed8;
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
    }

    tr.selected .selected-badge {
      display: inline-flex;
    }

    tbody tr:hover {
      background: #f7fbff;
    }

    tfoot td {
      background: #f8fafc;
      border-top: 1px solid var(--line);
      font-weight: 850;
      color: var(--navy);
    }

    .trend-panel {
      display: grid;
      gap: 0;
    }

    .trend-canvas-wrap {
      padding: 16px 18px 4px;
      min-height: 220px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 210px;
    }

    .year-table table {
      min-width: 760px;
    }

    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .source-note {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      padding: 0 2px;
    }

    @media (max-width: 980px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar {
        justify-content: start;
      }

      .summary-grid,
      .content-grid {
        grid-template-columns: 1fr 1fr;
      }

      .content-grid > .panel:first-child,
      .content-grid > .panel:last-child,
      .trend-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 640px) {
      .topbar,
      main {
        width: min(100% - 22px, 1280px);
      }

      .summary-grid,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      select,
      input {
        width: 100%;
      }

      .metric-value {
        font-size: 26px;
      }

      .bar-row {
        grid-template-columns: 72px minmax(90px, 1fr) 48px;
      }

      .panel-head {
        align-items: start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1>해양사고 현황 대시보드</h1>
            <p class="subtitle">1998년부터 2012년까지 연도별·유형별 사고 건수</p>
          </div>
        </div>
        <div class="toolbar" aria-label="데이터 필터">
          <div class="control">
            <label for="yearSelect">연도 선택</label>
            <select id="yearSelect"></select>
          </div>
          <div class="control">
            <label for="yearSearch">연도 검색</label>
            <input id="yearSearch" inputmode="numeric" autocomplete="off" placeholder="예: 2011">
          </div>
          <div class="status" id="searchStatus" aria-live="polite"></div>
        </div>
      </div>
    </header>

    <main>
      <section class="summary-grid" aria-label="선택 연도 요약">
        <article class="metric">
          <div class="metric-label">선택 연도</div>
          <div class="metric-value" id="metricYear">-</div>
          <div class="metric-note">드롭다운 기준</div>
        </article>
        <article class="metric">
          <div class="metric-label">총 사고 건수</div>
          <div class="metric-value" id="metricTotal">-</div>
          <div class="metric-note">선택 연도 총계</div>
        </article>
        <article class="metric">
          <div class="metric-label">최다 유형</div>
          <div class="metric-value" id="metricTopType">-</div>
          <div class="metric-note" id="metricTopTypeNote">-</div>
        </article>
        <article class="metric">
          <div class="metric-label">전체 기간 최고 연도</div>
          <div class="metric-value" id="metricMaxYear">-</div>
          <div class="metric-note" id="metricMaxYearNote">-</div>
        </article>
      </section>

      <section class="content-grid">
        <article class="panel">
          <div class="panel-head">
            <h2 id="typeChartTitle">유형별 사고 건수</h2>
            <span class="panel-kicker">선택 연도 기준</span>
          </div>
          <div class="chart-wrap">
            <div class="bar-list" id="typeBars"></div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2 id="typeTableTitle">사고유형별 건수 표</h2>
            <span class="panel-kicker" id="typeCountLabel">-</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th scope="col">사고 유형</th>
                  <th scope="col">건수</th>
                  <th scope="col">비중</th>
                </tr>
              </thead>
              <tbody id="typeTableBody"></tbody>
              <tfoot>
                <tr>
                  <td>총계</td>
                  <td id="typeTotalCell">-</td>
                  <td>100%</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </article>
      </section>

      <section class="panel trend-panel">
        <div class="panel-head">
          <h2>연도별 총계 추이</h2>
          <span class="panel-kicker">1998-2012</span>
        </div>
        <div class="trend-canvas-wrap">
          <canvas id="trendChart" width="1100" height="300" aria-label="연도별 총계 추이 차트"></canvas>
        </div>
      </section>

      <section class="panel year-table">
        <div class="panel-head">
          <h2>연도별·유형별 현황</h2>
          <span class="panel-kicker" id="yearTableLabel">15개 연도</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">연도</th>
                <th scope="col">총계</th>
                <th scope="col">충돌</th>
                <th scope="col">접촉</th>
                <th scope="col">좌초</th>
                <th scope="col">전복</th>
                <th scope="col">화재폭발</th>
                <th scope="col">침몰</th>
                <th scope="col">기관손상</th>
              </tr>
            </thead>
            <tbody id="yearTableBody"></tbody>
          </table>
        </div>
      </section>

      <div class="source-note">데이터: marine_accidents_1998_2012_cp949.csv</div>
    </main>
  </div>

  <script>
    const accidentData = [
      { year: 1998, total: 772, collision: 147, contact: 5, grounding: 77, capsize: 14, fireExplosion: 60, sinking: 84, engineDamage: 242 },
      { year: 1999, total: 849, collision: 173, contact: 2, grounding: 68, capsize: 27, fireExplosion: 67, sinking: 90, engineDamage: 269 },
      { year: 2000, total: 634, collision: 130, contact: 11, grounding: 58, capsize: 19, fireExplosion: 48, sinking: 63, engineDamage: 196 },
      { year: 2001, total: 610, collision: 141, contact: 15, grounding: 60, capsize: 21, fireExplosion: 62, sinking: 72, engineDamage: 135 },
      { year: 2002, total: 557, collision: 184, contact: 13, grounding: 58, capsize: 29, fireExplosion: 42, sinking: 55, engineDamage: 110 },
      { year: 2003, total: 531, collision: 182, contact: 9, grounding: 65, capsize: 22, fireExplosion: 53, sinking: 50, engineDamage: 57 },
      { year: 2004, total: 804, collision: 210, contact: 12, grounding: 75, capsize: 35, fireExplosion: 57, sinking: 69, engineDamage: 147 },
      { year: 2005, total: 658, collision: 172, contact: 10, grounding: 46, capsize: 22, fireExplosion: 71, sinking: 45, engineDamage: 166 },
      { year: 2006, total: 657, collision: 167, contact: 17, grounding: 66, capsize: 16, fireExplosion: 41, sinking: 25, engineDamage: 195 },
      { year: 2007, total: 566, collision: 148, contact: 9, grounding: 39, capsize: 21, fireExplosion: 37, sinking: 19, engineDamage: 185 },
      { year: 2008, total: 480, collision: 125, contact: 15, grounding: 32, capsize: 8, fireExplosion: 25, sinking: 18, engineDamage: 145 },
      { year: 2009, total: 723, collision: 160, contact: 10, grounding: 43, capsize: 18, fireExplosion: 34, sinking: 22, engineDamage: 253 },
      { year: 2010, total: 737, collision: 174, contact: 22, grounding: 64, capsize: 17, fireExplosion: 25, sinking: 22, engineDamage: 236 },
      { year: 2011, total: 946, collision: 208, contact: 23, grounding: 64, capsize: 38, fireExplosion: 57, sinking: 27, engineDamage: 261 },
      { year: 2012, total: 726, collision: 157, contact: 21, grounding: 53, capsize: 25, fireExplosion: 55, sinking: 26, engineDamage: 178 }
    ];

    const typeMeta = [
      { key: "collision", label: "충돌", color: "#2563eb" },
      { key: "contact", label: "접촉", color: "#0891b2" },
      { key: "grounding", label: "좌초", color: "#d97706" },
      { key: "capsize", label: "전복", color: "#be123c" },
      { key: "fireExplosion", label: "화재폭발", color: "#ea580c" },
      { key: "sinking", label: "침몰", color: "#6d28d9" },
      { key: "engineDamage", label: "기관손상", color: "#0f766e" }
    ];

    const elements = {
      yearSelect: document.getElementById("yearSelect"),
      yearSearch: document.getElementById("yearSearch"),
      searchStatus: document.getElementById("searchStatus"),
      metricYear: document.getElementById("metricYear"),
      metricTotal: document.getElementById("metricTotal"),
      metricTopType: document.getElementById("metricTopType"),
      metricTopTypeNote: document.getElementById("metricTopTypeNote"),
      metricMaxYear: document.getElementById("metricMaxYear"),
      metricMaxYearNote: document.getElementById("metricMaxYearNote"),
      typeChartTitle: document.getElementById("typeChartTitle"),
      typeTableTitle: document.getElementById("typeTableTitle"),
      typeCountLabel: document.getElementById("typeCountLabel"),
      typeBars: document.getElementById("typeBars"),
      typeTableBody: document.getElementById("typeTableBody"),
      typeTotalCell: document.getElementById("typeTotalCell"),
      yearTableBody: document.getElementById("yearTableBody"),
      yearTableLabel: document.getElementById("yearTableLabel"),
      trendChart: document.getElementById("trendChart")
    };

    let selectedYear = accidentData[accidentData.length - 1].year;
    let highlightedYear = null;

    function formatNumber(value) {
      return value.toLocaleString("ko-KR");
    }

    function getTypeRows(row) {
      return typeMeta.map((type) => ({
        ...type,
        value: row[type.key],
        ratio: row.total === 0 ? 0 : row[type.key] / row.total
      }));
    }

    function initYearSelect() {
      elements.yearSelect.innerHTML = accidentData
        .map((row) => `<option value="${row.year}">${row.year}</option>`)
        .join("");
      elements.yearSelect.value = String(selectedYear);
    }

    function renderMetrics(row) {
      const maxYearRow = accidentData.reduce((max, current) =>
        current.total > max.total ? current : max
      );
      const topType = getTypeRows(row).reduce((max, current) =>
        current.value > max.value ? current : max
      );

      elements.metricYear.textContent = row.year;
      elements.metricTotal.textContent = formatNumber(row.total);
      elements.metricTopType.textContent = topType.label;
      elements.metricTopTypeNote.textContent = `${formatNumber(topType.value)}건`;
      elements.metricMaxYear.textContent = maxYearRow.year;
      elements.metricMaxYearNote.textContent = `${formatNumber(maxYearRow.total)}건`;
    }

    function renderTypeBars(row) {
      const rows = getTypeRows(row).sort((a, b) => b.value - a.value);
      const maxValue = Math.max(...rows.map((type) => type.value));

      elements.typeBars.innerHTML = rows.map((type) => {
        const width = maxValue === 0 ? 0 : (type.value / maxValue) * 100;
        return `
          <div class="bar-row">
            <div class="bar-label" title="${type.label}">${type.label}</div>
            <div class="bar-track" aria-hidden="true">
              <div class="bar-fill" style="width: ${width}%; background: ${type.color};"></div>
            </div>
            <div class="bar-value">${formatNumber(type.value)}</div>
          </div>
        `;
      }).join("");
    }

    function renderTypeTable(row) {
      const rows = getTypeRows(row);
      elements.typeTableBody.innerHTML = rows.map((type) => `
        <tr>
          <td>${type.label}</td>
          <td>${formatNumber(type.value)}</td>
          <td>${Math.round(type.ratio * 1000) / 10}%</td>
        </tr>
      `).join("");

      elements.typeTotalCell.textContent = formatNumber(row.total);
      elements.typeChartTitle.textContent = `${row.year}년 유형별 사고 건수`;
      elements.typeTableTitle.textContent = `${row.year}년 사고유형별 건수 표`;
      elements.typeCountLabel.textContent = `${typeMeta.length}개 유형`;
    }

    function renderYearTable() {
      elements.yearTableBody.innerHTML = accidentData.map((row) => {
        const classNames = [];
        if (row.year === selectedYear) classNames.push("selected");
        if (row.year === highlightedYear) classNames.push("highlight");

        return `
          <tr id="year-row-${row.year}" class="${classNames.join(" ")}">
            <td><span class="year-cell">${row.year}<span class="selected-badge">선택</span></span></td>
            <td>${formatNumber(row.total)}</td>
            <td>${formatNumber(row.collision)}</td>
            <td>${formatNumber(row.contact)}</td>
            <td>${formatNumber(row.grounding)}</td>
            <td>${formatNumber(row.capsize)}</td>
            <td>${formatNumber(row.fireExplosion)}</td>
            <td>${formatNumber(row.sinking)}</td>
            <td>${formatNumber(row.engineDamage)}</td>
          </tr>
        `;
      }).join("");

      elements.yearTableLabel.textContent = `${accidentData.length}개 연도`;
    }

    function drawTrendChart() {
      const canvas = elements.trendChart;
      const ctx = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(640, Math.floor(rect.width * dpr));
      canvas.height = Math.floor(300 * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const width = canvas.width / dpr;
      const height = canvas.height / dpr;
      const padding = { top: 18, right: 20, bottom: 42, left: 54 };
      const plotWidth = width - padding.left - padding.right;
      const plotHeight = height - padding.top - padding.bottom;
      const totals = accidentData.map((row) => row.total);
      const minValue = Math.floor((Math.min(...totals) - 40) / 50) * 50;
      const maxValue = Math.ceil((Math.max(...totals) + 40) / 50) * 50;

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = "#d9e0e7";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#5f6d7d";
      ctx.font = "12px Segoe UI, Malgun Gothic, sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";

      for (let i = 0; i <= 4; i += 1) {
        const value = minValue + ((maxValue - minValue) / 4) * i;
        const y = padding.top + plotHeight - ((value - minValue) / (maxValue - minValue)) * plotHeight;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.stroke();
        ctx.fillText(Math.round(value).toLocaleString("ko-KR"), padding.left - 8, y);
      }

      const points = accidentData.map((row, index) => {
        const x = padding.left + (index / (accidentData.length - 1)) * plotWidth;
        const y = padding.top + plotHeight - ((row.total - minValue) / (maxValue - minValue)) * plotHeight;
        return { x, y, row };
      });

      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 3;
      ctx.beginPath();
      points.forEach((point, index) => {
        if (index === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
      });
      ctx.stroke();

      points.forEach((point) => {
        const isSelected = point.row.year === selectedYear;
        const isHighlighted = point.row.year === highlightedYear;
        ctx.beginPath();
        ctx.fillStyle = isHighlighted ? "#f59e0b" : isSelected ? "#0f766e" : "#ffffff";
        ctx.strokeStyle = isHighlighted ? "#b45309" : isSelected ? "#0f766e" : "#2563eb";
        ctx.lineWidth = isSelected || isHighlighted ? 3 : 2;
        ctx.arc(point.x, point.y, isSelected || isHighlighted ? 5 : 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      });

      ctx.fillStyle = "#5f6d7d";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      points.forEach((point, index) => {
        if (index % 2 === 0 || point.row.year === selectedYear || point.row.year === highlightedYear) {
          ctx.fillText(String(point.row.year), point.x, padding.top + plotHeight + 14);
        }
      });
    }

    function renderDashboard() {
      const row = accidentData.find((item) => item.year === selectedYear) || accidentData[0];
      elements.yearSelect.value = String(row.year);
      renderMetrics(row);
      renderTypeBars(row);
      renderTypeTable(row);
      renderYearTable();
      drawTrendChart();
    }

    function handleSearchInput() {
      const rawValue = elements.yearSearch.value.trim();
      if (!rawValue) {
        highlightedYear = null;
        elements.searchStatus.textContent = "";
        renderDashboard();
        return;
      }

      const year = Number(rawValue);
      const found = accidentData.find((row) => row.year === year);
      if (found) {
        highlightedYear = found.year;
        selectedYear = found.year;
        elements.searchStatus.textContent = `${found.year}년`;
        renderDashboard();
        requestAnimationFrame(() => {
          document.getElementById(`year-row-${found.year}`)?.scrollIntoView({
            behavior: "smooth",
            block: "center",
            inline: "nearest"
          });
        });
      } else {
        highlightedYear = null;
        elements.searchStatus.textContent = "검색 결과 없음";
        renderDashboard();
      }
    }

    elements.yearSelect.addEventListener("change", (event) => {
      selectedYear = Number(event.target.value);
      renderDashboard();
    });

    elements.yearSearch.addEventListener("input", handleSearchInput);
    window.addEventListener("resize", drawTrendChart);

    initYearSelect();
    renderDashboard();
  </script>
</body>
</html>
